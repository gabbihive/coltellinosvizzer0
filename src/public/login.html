<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Control Panel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e1e4e8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 380px;
    }

    .login-card h1 {
      font-size: 20px;
      font-weight: 600;
      color: #f0f6fc;
      text-align: center;
      margin-bottom: 8px;
    }

    .login-card p {
      font-size: 13px;
      color: #8b949e;
      text-align: center;
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #e1e4e8;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e1e4e8;
      font-size: 14px;
      outline: none;
      margin-bottom: 16px;
    }

    input:focus {
      border-color: #58a6ff;
    }

    input::placeholder {
      color: #484f58;
    }

    .btn {
      width: 100%;
      padding: 10px 16px;
      background: #238636;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn:hover { background: #2ea043; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .error-msg {
      background: #2d1214;
      border: 1px solid #f8514933;
      color: #f85149;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .lock-icon {
      text-align: center;
      margin-bottom: 16px;
    }

    .lock-icon svg {
      width: 40px;
      height: 40px;
      fill: #8b949e;
    }
  </style>
</head>
<body>
  <form class="login-card" id="loginForm" autocomplete="on">
    <div class="lock-icon">
      <svg viewBox="0 0 24 24"><path d="M12 1C8.676 1 6 3.676 6 7v2H4a1 1 0 0 0-1 1v11a1 1 0 0 0 1 1h16a1 1 0 0 0 1-1V10a1 1 0 0 0-1-1h-2V7c0-3.324-2.676-6-6-6zm0 2c2.276 0 4 1.724 4 4v2H8V7c0-2.276 1.724-4 4-4zm-7 8h14v9H5v-9zm7 2a2 2 0 0 0-1 3.732V18a1 1 0 1 0 2 0v-1.268A2 2 0 0 0 12 13z"/></svg>
    </div>
    <h1>Control Panel</h1>
    <p>Sign in to continue</p>

    <div class="error-msg" id="errorMsg"></div>

    <label for="username">Username</label>
    <input type="text" id="username" name="username" autocomplete="username" placeholder="admin" required>

    <label for="password">Password</label>
    <input type="password" id="password" name="password" autocomplete="current-password" required>

    <button type="submit" class="btn" id="loginBtn">Sign in</button>
  </form>

  <script>
    // If already authenticated, go straight to the panel
    fetch('/auth/check').then(r => r.json()).then(d => {
      if (d.authenticated) window.location.href = '/';
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const errEl = document.getElementById('errorMsg');
      errEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
          }),
        });

        if (res.ok) {
          window.location.href = '/';
        } else {
          const data = await res.json();
          errEl.textContent = data.error || 'Login failed';
          errEl.style.display = 'block';
          document.getElementById('password').value = '';
          document.getElementById('password').focus();
        }
      } catch {
        errEl.textContent = 'Connection error. Is the server running?';
        errEl.style.display = 'block';
      }

      btn.disabled = false;
      btn.textContent = 'Sign in';
    });
  </script>
</body>
</html>
