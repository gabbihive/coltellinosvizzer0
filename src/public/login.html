<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
      background: #0a0a0a;
      color: #a0a0a0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: #111;
      border: 1px solid #1a1a1a;
      border-radius: 4px;
      padding: 32px;
      width: 100%;
      max-width: 340px;
    }

    .login-card h1 {
      font-size: 13px;
      font-weight: 600;
      color: #e0e0e0;
      text-align: center;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .login-card p {
      font-size: 11px;
      color: #333;
      text-align: center;
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-size: 10px;
      font-weight: 500;
      color: #555;
      margin-bottom: 4px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      padding: 8px 10px;
      background: #0a0a0a;
      border: 1px solid #222;
      border-radius: 3px;
      color: #d0d0d0;
      font-family: inherit;
      font-size: 12px;
      outline: none;
      margin-bottom: 14px;
    }

    input:focus { border-color: #333; }
    input::placeholder { color: #282828; }

    .btn {
      width: 100%;
      padding: 8px 14px;
      background: #0d1a0d;
      color: #4a8c4a;
      border: 1px solid #1a331a;
      border-radius: 3px;
      font-family: inherit;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all 0.15s;
    }

    .btn:hover { background: #143014; color: #6abf6a; }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .error-msg {
      background: #1a0d0d;
      border: 1px solid #331a1a;
      color: #8c4a4a;
      border-radius: 3px;
      padding: 8px 10px;
      font-size: 11px;
      margin-bottom: 14px;
      display: none;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 16px;
      font-size: 10px;
      color: #282828;
    }

    .back-link a { color: #333; text-decoration: none; }
    .back-link a:hover { color: #555; }
  </style>
</head>
<body>
  <form class="login-card" id="loginForm" autocomplete="on">
    <h1>Admin</h1>
    <p>authenticate to continue</p>

    <div class="error-msg" id="errorMsg"></div>

    <label for="username">Username</label>
    <input type="text" id="username" name="username" autocomplete="username" placeholder="admin" required>

    <label for="password">Password</label>
    <input type="password" id="password" name="password" autocomplete="current-password" required>

    <button type="submit" class="btn" id="loginBtn">Authenticate</button>

    <div class="back-link"><a href="/">&larr; back to tools</a></div>
  </form>

  <script>
    fetch('/auth/check').then(r => r.json()).then(d => {
      if (d.authenticated) window.location.href = '/panel';
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const errEl = document.getElementById('errorMsg');
      errEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Authenticating...';

      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
          }),
        });

        if (res.ok) {
          window.location.href = '/panel';
        } else {
          const data = await res.json();
          errEl.textContent = data.error || 'Authentication failed';
          errEl.style.display = 'block';
          document.getElementById('password').value = '';
          document.getElementById('password').focus();
        }
      } catch {
        errEl.textContent = 'Connection error.';
        errEl.style.display = 'block';
      }

      btn.disabled = false;
      btn.textContent = 'Authenticate';
    });
  </script>
</body>
</html>
