<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="referrer" content="no-referrer">
  <title>Login</title>
  <style>
    :root {
      --bg-primary: #0a0a0a;
      --bg-card: #111111;
      --bg-input: #0e0e0e;
      --text-primary: #e8e8e8;
      --text-secondary: #8a8a8a;
      --text-tertiary: #555555;
      --text-faint: #333333;
      --border: #1e1e1e;
      --border-focus: #333333;
      --accent: #3a7bd5;
      --accent-hover: #4a8be5;
      --red: #d14040;
      --red-dim: #1f0f0f;
      --radius: 12px;
      --radius-sm: 8px;
      --font-ui: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-ui);
      background: var(--bg-primary);
      color: var(--text-secondary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 28px;
      width: 100%;
      max-width: 380px;
    }

    .login-card h1 {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
      text-align: center;
      letter-spacing: -0.3px;
      margin-bottom: 4px;
    }

    .login-card > p {
      font-size: 14px;
      color: var(--text-tertiary);
      text-align: center;
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 13px;
      color: var(--text-tertiary);
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: var(--font-ui);
      font-size: 15px;
      outline: none;
      margin-bottom: 16px;
      min-height: 44px;
      transition: border-color 0.15s ease;
    }

    input:focus { border-color: var(--border-focus); }
    input::placeholder { color: var(--text-faint); }

    .btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 20px;
      background: var(--accent);
      color: #ffffff;
      border: none;
      border-radius: var(--radius-sm);
      font-family: var(--font-ui);
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:hover { background: var(--accent-hover); }
    .btn:active { background: #2a6bc5; }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .error-msg {
      background: var(--red-dim);
      border: 1px solid #331a1a;
      color: var(--red);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
    }

    .back-link a {
      color: var(--text-tertiary);
      text-decoration: none;
      transition: color 0.15s ease;
    }

    .back-link a:hover { color: var(--text-secondary); }
  </style>
</head>
<body>
  <form class="login-card" id="loginForm" autocomplete="off">
    <h1>Sign in</h1>
    <p>Admin credentials required</p>

    <div class="error-msg" id="errorMsg"></div>

    <label for="username">Username</label>
    <input type="text" id="username" name="username" autocomplete="off" placeholder="admin" required>

    <label for="password">Password</label>
    <input type="password" id="password" name="password" autocomplete="off" required>

    <button type="submit" class="btn" id="loginBtn">Sign in</button>

    <div class="back-link"><a href="/">&larr; Back to tools</a></div>
  </form>

  <script>
    fetch('/auth/check').then(r => r.json()).then(d => {
      if (d.authenticated) window.location.href = '/panel';
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const errEl = document.getElementById('errorMsg');
      errEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
          }),
        });

        if (res.ok) {
          window.location.href = '/panel';
        } else {
          const data = await res.json();
          errEl.textContent = data.error || 'Authentication failed';
          errEl.style.display = 'block';
          document.getElementById('password').value = '';
          document.getElementById('password').focus();
        }
      } catch {
        errEl.textContent = 'Connection error.';
        errEl.style.display = 'block';
      }

      btn.disabled = false;
      btn.textContent = 'Sign in';
    });
  </script>
</body>
</html>
